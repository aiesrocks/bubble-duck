name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # BubbleCore is pure Swift and testable on Linux; we run it in the official
  # swift container so we catch simulation regressions without needing a Mac.
  core-linux:
    name: BubbleCore (Linux)
    runs-on: ubuntu-latest
    container:
      image: swift:5.9-jammy
    steps:
      - uses: actions/checkout@v4
      - name: Build BubbleCore
        run: swift build --target BubbleCore
      - name: Run BubbleCore tests
        run: swift test

  # Full macOS build covers the AppKit layer (SystemMetrics, BubbleRenderer,
  # DockTileController) which Linux can't compile.
  macos:
    name: Build & Test (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Show Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test
